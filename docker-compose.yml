services:
  openclaw:
    build:
      context: .
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        OPENCLAW_VERSION: ${OPENCLAW_VERSION:-latest}
    image: openclaw-workspace:local
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-18789}:18789"
    volumes:
      # Bind mount config + workspaces (persists across container restarts)
      # FLAG-2 fix: container is self-contained, no host npm mount needed
      - ${OPENCLAW_HOME:-~/.openclaw}:/home/oc/.openclaw
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_PORT=18789
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
