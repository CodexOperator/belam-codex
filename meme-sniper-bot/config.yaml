telegram:
  api_id: ""          # Get from https://my.telegram.org
  api_hash: ""        # Get from https://my.telegram.org
  phone: ""           # Your phone number with country code
  group: "inside_calls"  # Target group username or ID

trading:
  starting_capital: 30.0    # USD
  per_trade_amount: 3.0     # USD per buy-in (10%)
  slippage_bps: 500         # 5% slippage tolerance for meme coins
  chain: "solana"
  dry_run: true             # Set false to execute real swaps

tp_ladder:
  - multiplier: 2.0
    sell_pct: 0.6667    # Sell 2/3 at 2x
  - multiplier: 4.0
    sell_pct: 0.20      # Sell 20% of remaining at 4x
  - multiplier: 8.0
    sell_pct: 0.20
  - multiplier: 15.0
    sell_pct: 0.20
  - multiplier: 25.0
    sell_pct: 0.20
  - multiplier: 100.0
    sell_pct: 0.20

classifier:
  model: "anthropic/claude-sonnet-4-20250514"
  api_key: ""         # Anthropic API key for classifier

price_monitor:
  poll_interval_seconds: 30
  dexscreener_api: "https://api.dexscreener.com/latest/dex"
  log_interval_seconds: 300  # Log prices every 5 min

wallet:
  path: "wallet/keypair.json"
  password: ""        # Optional encryption password

logging:
  level: "INFO"
  file: "sniper.log"

solana:
  rpc_url: "https://api.mainnet-beta.solana.com"
